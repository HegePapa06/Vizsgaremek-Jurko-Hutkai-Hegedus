<div class="page-wrapper">
  <div class="registration-card" [class.expand]="role === 'tanar'">
    
    <div class="left-side">
      <h2>Regisztráció</h2>
      <form (ngSubmit)="onRegister()">
        <div class="input-wrap">
          <label>FELHASZNÁLÓNÉV</label>
          <input type="text" [(ngModel)]="username" name="username" required>
        </div>

        <div class="input-wrap">
          <label>EMAIL</label>
          <input type="email" [(ngModel)]="email" name="email" required>
        </div>

        <div class="input-wrap">
          <label>JELSZÓ</label>
          <input type="password" [(ngModel)]="password" name="password" required>
        </div>

        <div class="input-wrap">
          <label>SZEREPKÖR</label>
          <select [(ngModel)]="role" name="role" required (change)="onRoleChange()">
            <option value="tanulo">Tanuló</option>
            <option value="tanar">Tanár</option>
          </select>
        </div>

        <button *ngIf="role !== 'tanar'" type="submit" class="submit-btn">REGISZTRÁCIÓ</button>

        <div class="form-footer">
          <p>Már van fiókod? <a routerLink="/login">Bejelentkezés</a></p>
        </div>
      </form>
    </div>

    <div class="right-side" *ngIf="role === 'tanar'">
      <h3>Tanári adatok</h3>
      
      <div class="input-row">
        <div class="input-wrap">
          <label>TANÁRI KÓD</label>
          <input type="text" [(ngModel)]="teacherCode" name="teacherCode">
        </div>
        <div class="input-wrap">
          <label>TELEFONSZÁM</label>
          <input type="tel" [(ngModel)]="phone" name="phone">
        </div>
      </div>

      <div class="input-wrap">
        <label>MEGYE</label>
    <select [(ngModel)]="county" name="county">
      <option value="Bács-Kiskun">Bács-Kiskun</option>
      <option value="Baranya">Baranya</option>
      <option value="Békés">Békés</option>
      <option value="Borsod-Abaúj-Zemplén">Borsod-Abaúj-Zemplén</option>
      <option value="Csongrád-Csanád">Csongrád-Csanád</option>
      <option value="Fejér">Fejér</option>
      <option value="Győr-Moson-Sopron">Győr-Moson-Sopron</option>
      <option value="Hajdú-Bihar">Hajdú-Bihar</option>
      <option value="Heves">Heves</option>
      <option value="Jász-Nagykun-Szolnok">Jász-Nagykun-Szolnok</option>
      <option value="Komárom-Esztergom">Komárom-Esztergom</option>
      <option value="Nógrád">Nógrád</option>
      <option value="Pest">Pest</option>
      <option value="Somogy">Somogy</option>
      <option value="Szabolcs-Szatmár-Bereg">Szabolcs-Szatmár-Bereg</option>
      <option value="Tolna">Tolna</option>
      <option value="Vas">Vas</option>
      <option value="Veszprém">Veszprém</option>
      <option value="Zala">Zala</option>
      <option value="Budapest">Budapest</option>
    </select>
      </div>

      <div class="input-wrap">
        <label>VÁROS</label>
        <input type="text" [(ngModel)]="city" name="city">
      </div>

      <div class="input-wrap">
        <label>BEMUTATKOZÁS</label>
        <textarea [(ngModel)]="bio" name="bio" rows="2"></textarea>
      </div>

      <div class="input-wrap">
        <label>PROFILKÉP / AUTÓ KÉPE</label>
        <input type="file" class="file-input" (change)="onFileSelected($event)">
      </div>

      <button type="submit" class="submit-btn" (click)="onRegister()">TANÁRI REGISZTRÁCIÓ</button>
    </div>

  </div>
</div>
